[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip", "stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "npm install",
  "npm --prefix backend install",
  "npm --prefix frontend install",
  "pip install --break-system-packages -r backend/ml/model/requirements.txt"
]

[phases.build]
cmds = ["CI=false npm run build"]

[start]
cmd = "npm start"
