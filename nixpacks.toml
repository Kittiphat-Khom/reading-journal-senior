[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "npm install",
  "npm --prefix backend install",
  "npm --prefix frontend install",
  "pip install -r backend/ml/model/requirements.txt"
]

[phases.build]
cmds = ["CI=false npm run build"]

[start]
cmd = "npm start"
