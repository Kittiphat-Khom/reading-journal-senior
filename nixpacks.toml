[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.numpy", "python312Packages.pandas"]

[phases.install]
cmds = [
  "pip3 install sentence-transformers scikit-learn",
  "npm install",
  "npm --prefix backend install",
  "npm --prefix frontend install"
]

[phases.build]
cmds = [
  "CI=false npm run build",
  "python3 backend/ml/model/train_model.py"
]

[start]
cmd = "bash start.sh"
